<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script> 
        window.onload = inicio;
        function inicio()
        {
            let botao = document.getElementById("btn_calcular");
            botao.addEventListener('click', calculo);
        }

        function calculo()
        {
            let saida = document.getElementById('resultado');
            saida.innerHTML = calcArea(4);
        }

        function calcArea(raio) 
        {
            let area = Math.PI * Math.pow(raio,2);
            return area;
        }
    </script>
</head>
<body>
        <h1>Aperte o botão</h1>
    <p id="resultado">Resultado...</p>
    <button id="btn_calcular">Área</button>
</body>
</html>
